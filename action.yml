name: "fxpw FTP Deploy Action"
description: "Загрузка файлов на FTP/FTPS/SFTP с логированием каждого файла"
author: 'Anton Koshel <fxpw@outlook.com>'

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'file-plus'  
  color: 'green'

inputs:
  connection_type:
    description: "Тип соединения: ftp | ftps | sftp | ftps/ftp (автоопределение FTPS→FTP)"
    required: false
    default: "ftps/ftp"
  host:
    description: "FTP/SFTP хост"
    required: true
  username:
    description: "FTP пользователь"
    required: true
  password:
    description: "FTP пароль"
    required: true
  local_dir:
    description: "Локальная папка для загрузки"
    required: true
    default: "./"
  remote_dir:
    description: "Директория на сервере"
    required: false
    default: "/"
  secure:
    description: "FTPS (true/false), используется только для FTP/FTPS"
    required: false
    default: "false"
  secure_reject_unauthorized:
    description: "Проверять TLS сертификат сервера (для self-signed установите false), только для FTPS"
    required: false
    default: "true"
  retry_count:
    description: "Количество повторных попыток загрузки при сетевых ошибках"
    required: false
    default: "3"
  retry_delay_ms:
    description: "Задержка между повторными попытками в миллисекундах"
    required: false
    default: "2000"
  parallel_uploads:
    description: "Количество параллельных загрузок (1-3)"
    required: false
    default: "3"